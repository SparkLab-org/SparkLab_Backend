spring:
  application:
    name: study

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  cache:
    type: simple

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/.well-known/jwks.json

app:
  upload-dir: uploads

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS}
