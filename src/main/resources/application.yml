spring:
  application:
    name: study

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  cache:
    type: simple

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${JWT_ISSUER_URI}

app:
  upload-dir: ${UPLOAD_DIR}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:https://spark-lab-frontend-kappa.vercel.app,http://localhost:3000}
