feedback-templates:
  greetings:
    - "오늘도 수고했습니다!"
    - "고생 많았습니다!"
    - "잘 하고 있군요!"
    - "오늘 하루도 알차게 보냈나요?"
    - "수업 시간에 늦지 않고 출석하는 모습이 아주 성실합니다."
    - "지치기 쉬운 시기인데 포기하지 않고 따라와 줘서 고맙습니다."
  coaching:
    - "(기초 유형) 잘 하고 있으니 (심화 응용 단계) 로 넘어가 봐요!"
    - "(오답 노트 정리)는 중요한 부분이니 지속적으로 유지해 봐요!"
    - "(함수 파트)는 응용이 중요하니 (그래프 정의) 개념을 다시 복습하며 풀어봐요!"
    - "(풀이 과정을 정돈해서 쓰는 습관)이 잘 잡혔으니 (계산 속도)를 높이는 연습을 해봅시다."
    - "(핵심 키워드 추출)을 잘 하고 있으니 이를 활용해 (전체 문장 요약)까지 시도해 봐요!"
  study-tips:
    - "백지 복습: 수업이 끝나고 5분 동안 빈 종이에 오늘 배운 핵심 키워드를 모두 적어보세요."
    - "오답 분석: 단순히 틀린 이유를 적는 게 아니라, 어느 지점에서 개념 적용을 잘못했는지를 한 줄로 메모하면 좋아요."
    - "집중력 관리: 50분 집중하고 10분 쉬는 루틴을 지키면 장기적으로 덜 지칠 거예요."
    - "질문 습관: 모르는 것이 생기면 별표를 치고 넘어간 뒤, 수업 시작 전에 리스트를 만들어 질문을 전달해 주세요."
  subject-tips:
    KOREAN:
      - "국어: 지문을 읽기 전에 문제를 먼저 훑어보며 무엇을 찾아야 할지 목표를 미리 확인해봐요."
    MATH:
      - "수학: 단순히 답지 풀이를 확인하기보다는 어떤 구조로 개념을 응용했는지 파악해봐요."
    ENGLISH:
      - "영어: 단어는 눈으로만 보지 말고 문장 속에서 어떻게 쓰이는지 맥락을 파악해봐요."
    ALL:
      - "과목 공통: 개념 정리 후, 왜 그 풀이가 성립하는지 한 문장으로 설명해보면 이해가 더 깊어집니다."
  weakness-tips:
    CONCEPT_LACK:
      - "[개념 부족형] (기본 용어 정의)는 잘 파악했으니, 이제 (공식 유도 과정) 단계로 넘어가 봐요!"
    APPLICATION_LACK:
      - "[응용 부족형] (변형 문제)는 원리를 찾는 것이 중요하니, (기본 예제)의 핵심 개념을 다시 복습하며 풀어봐요!"
    CARELESS:
      - "[실수 연발형] (풀이 과정의 논리)는 중요한 부분이니 지속적으로 유지하되, (마지막 연산) 단계는 한 번 더 검토해 봐요!"
    TIME_LACK:
      - "[시간 부족형] (정확도)는 충분히 올라왔으니, 이제는 (타이머)를 활용해 문제당 시간을 제한하며 풀어봐요!"
  praise:
    - "노력: 과제 수행도가 아주 높네요. 단순히 푸는 것을 넘어 꼼꼼하게 고민한 흔적이 느껴져서 좋습니다."
    - "노력: 질문의 질이 지난번보다 훨씬 좋아졌습니다. 내용을 완벽히 이해하려고 노력했다는 증거예요."
    - "성장: 지난번 수업 때 어려워했던 부분을 오늘 완벽히 해결했네요. 성장이 눈으로 보입니다."
    - "성장: 오답률이 확연히 줄어들고 있습니다. 지금처럼만 하면 목표 점수는 충분히 달성할 수 있습니다."
    - "성장: 본인만의 풀이 노하우가 생기고 있는 것 같아요. 스스로를 믿고 이 흐름을 유지해 봅시다."
    - "정서적 지지: 공부하느라 몸도 마음도 지치겠지만, 잘 해내고 있으니 너무 조급해하지 마세요."
    - "정서적 지지: 모르는 부분이 생기면 언제든 편하게 물어보세요. 멘티님의 성장을 항상 응원하고 있습니다."
    - "정서적 지지: 오늘 배운 어려운 개념을 잘 소화해 냈으니, 충분히 자부심을 가져도 좋습니다."
    - "정서적 지지: 오늘 정말 고생 많았습니다. 주말 동안은 좋아하는 것도 하며 푹 쉬고 오세요."
